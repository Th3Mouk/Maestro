apiVersion: maestro/v1
kind: Pack
metadata:
  name: "@maestro/pack-github-actions"
  version: 0.1.0
  visibility: public
spec:
  compatibility:
    framework: ">=0.1.0 <1.0.0"
  provides:
    skills:
      - gha-normalizer
    policies:
      - no-source-changes-in-ops
    agents:
      codex:
        - workflow-normalizer
  fragments:
    - repositories.partial.yaml
    - runtimes.partial.yaml
