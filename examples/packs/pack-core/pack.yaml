apiVersion: maestro/v1
kind: Pack
metadata:
  name: "@maestro/pack-core"
  version: 0.1.0
  visibility: public
spec:
  compatibility:
    framework: ">=0.1.0 <1.0.0"
  provides:
    agents:
      codex:
        - planner
        - repo-auditor
      claude-code:
        - planner
      opencode:
        - planner
    skills:
      - gha-normalizer
      - registry-auth-audit
    policies:
      - allowed-paths
      - diff-size-limit
    templates:
      - AGENTS.md
      - CLAUDE.md
    hooks:
      install:
        - scripts/install.js
      validate:
        - scripts/validate.js
