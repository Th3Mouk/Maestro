name: pull-request-ci

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    if: github.event.pull_request.draft == false && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.12.x
          - 24.x

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm knip
      - run: pnpm typecheck
      - run: pnpm test:audit-prod
      - run: pnpm test:npm-shrinkwrap
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test:runtime-dependencies
      - run: pnpm test:smoke
      - run: pnpm test:pack
