name: pull-request-ci

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'push' || (github.event.pull_request.draft == false && !startsWith(github.head_ref, 'release/'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.12.x
          - 24.x

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm knip
      - run: pnpm typecheck
      - run: pnpm test:audit-prod
      - run: pnpm test:npm-shrinkwrap
      - run: pnpm build
      - run: pnpm test
        if: matrix.node-version == '22.12.x'
      - run: pnpm test:coverage:ci
        if: matrix.node-version == '24.x'
      - name: Upload coverage reports to Codecov
        if: matrix.node-version == '24.x' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          disable_search: true
          files: ./coverage/lcov.info
          fail_ci_if_error: true
      - run: pnpm test:runtime-dependencies
      - run: pnpm test:smoke
      - run: pnpm test:pack
