name: prepare-release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release level
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: prepare-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Sync main and tags
        run: |
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main

      - run: pnpm install --frozen-lockfile

      - name: Guard against incomplete release state on main
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          HEAD_SUBJECT="$(git log -1 --pretty=%s)"
          TAG_EXISTS="false"
          NPM_MATCHES="false"

          if git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; then
            TAG_EXISTS="true"
          fi

          PUBLISHED_VERSION="$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)"
          if [ "$PUBLISHED_VERSION" = "$CURRENT_VERSION" ]; then
            NPM_MATCHES="true"
          fi

          if [[ "$HEAD_SUBJECT" == chore\(release\):* ]] && { [ "$TAG_EXISTS" != "true" ] || [ "$NPM_MATCHES" != "true" ]; }; then
            echo "main already contains release commit $HEAD_SUBJECT but publication is incomplete."
            echo "Resolve the publish workflow for v$CURRENT_VERSION before preparing another release."
            exit 1
          fi

          # Detect version drift: package.json must not be behind existing tags.
          LATEST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          if [ -n "$LATEST_TAG" ]; then
            LATEST_TAG_VERSION="${LATEST_TAG#v}"
            if [ "$(node -p "require('semver').gt('$LATEST_TAG_VERSION','$CURRENT_VERSION')")" = "true" ]; then
              echo "Version drift detected: package.json is at $CURRENT_VERSION but tag $LATEST_TAG already exists."
              echo "The release commit for $LATEST_TAG is not in main's history."
              echo "Fix package.json version to $LATEST_TAG_VERSION before preparing another release."
              exit 1
            fi
          fi

      - name: Compute next version
        id: version
        run: |
          NEXT_VERSION="$(npm version "${{ inputs.release_type }}" --no-git-tag-version)"
          VERSION="${NEXT_VERSION#v}"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_branch=release/v$VERSION" >> "$GITHUB_OUTPUT"

      - run: pnpm pack:artifact
      - run: node scripts/verify-packed-artifact.mjs

      - name: Commit release branch
        run: |
          RELEASE_BRANCH="${{ steps.version.outputs.release_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$RELEASE_BRANCH"
          git add package.json npm-shrinkwrap.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Publish release branch
        env:
          # Use MERGE_PAT here so the release branch push and PR creation emit
          # real push/pull_request events that trigger ci.yml.
          GH_TOKEN: ${{ secrets.MERGE_PAT }}
        run: |
          RELEASE_BRANCH="${{ steps.version.outputs.release_branch }}"
          gh auth setup-git
          git push --force-with-lease origin HEAD:"$RELEASE_BRANCH"

      - name: Open release PR
        env:
          # GITHUB_TOKEN-created PRs do not fan out into the PR CI workflow.
          GH_TOKEN: ${{ secrets.MERGE_PAT }}
        run: |
          RELEASE_BRANCH="${{ steps.version.outputs.release_branch }}"
          PR_URL="$(gh pr list --head "$RELEASE_BRANCH" --state open --json url --jq 'if length > 0 then .[0].url else empty end')"

          if [ -z "$PR_URL" ]; then
            PR_URL="$(gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "chore(release): v${{ steps.version.outputs.version }}" \
              --body "Automated release PR for v${{ steps.version.outputs.version }}.")"
          fi

          MERGE_STATE="$(gh pr view "$PR_URL" --json mergeStateStatus --jq '.mergeStateStatus')"
          if [ "$MERGE_STATE" = "CLEAN" ]; then
            gh pr merge "$PR_URL" --squash --delete-branch
          else
            gh pr merge "$PR_URL" --auto --squash --delete-branch
          fi
